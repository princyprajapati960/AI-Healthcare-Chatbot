# Redis Configuration for AI Healthcare Chatbot
# This configuration ensures HIPAA-compliant caching with optimal performance
# Version: Redis 7+

# ===== NETWORK =====
# Bind to localhost only for security (change for production)
bind 127.0.0.1
port 6379
# Protected mode prevents access from external networks
protected-mode yes

# ===== MEMORY MANAGEMENT =====
# Set maximum memory to 2GB (2147483648 bytes)
maxmemory 2gb

# Eviction policy: allkeys-lru
# When memory limit is reached, evict least recently used keys across all keys
# This ensures intelligent caching for medical knowledge, sessions, and codes
maxmemory-policy allkeys-lru

# Number of samples for LRU algorithm (higher = more accurate, slower)
maxmemory-samples 5

# ===== PERSISTENCE =====
# RDB Snapshots: Save database to disk periodically
# save <seconds> <changes>
# Save if at least 1 change in 900 seconds (15 minutes) - as per requirement
save 900 1
# Save if at least 10 changes in 300 seconds (5 minutes)
save 300 10
# Save if at least 10000 changes in 60 seconds
save 60 10000

# RDB filename
dbfilename dump.rdb

# Directory where RDB snapshots are saved
dir ./

# Compress RDB snapshots using LZF compression
rdbcompression yes

# Add checksum to RDB files for corruption detection
rdbchecksum yes

# ===== SECURITY =====
# Require password for authentication (set this in production)
# requirepass your_secure_password_here

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG ""

# ===== PERFORMANCE =====
# Maximum number of client connections
maxclients 10000

# TCP listen backlog
tcp-backlog 511

# Close connection after client idle for N seconds (0 = disable)
timeout 0

# TCP keepalive
tcp-keepalive 300

# ===== LOGGING =====
# Log level: debug, verbose, notice, warning
loglevel notice

# Log file location (empty string = stdout)
logfile ""

# ===== ADVANCED =====
# Number of databases
databases 16

# Disable active rehashing for predictable performance
activerehashing yes

# Lazy freeing for better performance
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ===== SLOW LOG =====
# Log queries slower than N microseconds (10000 = 10ms)
slowlog-log-slower-than 10000
slowlog-max-len 128

# ===== CLIENT OUTPUT BUFFER LIMITS =====
# Prevents clients from consuming too much memory
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ===== MEMORY MONITORING =====
# Report memory fragmentation and other memory-related issues
# These settings help monitor cache efficiency
maxmemory-policy-percentage 80

# ===== NOTES =====
# To start Redis with this configuration:
#   redis-server redis.conf
#
# To monitor Redis:
#   redis-cli INFO memory
#   redis-cli INFO stats
#
# To check eviction:
#   redis-cli INFO stats | grep evicted_keys
#
# To monitor cache hit rate:
#   redis-cli INFO stats | grep keyspace
