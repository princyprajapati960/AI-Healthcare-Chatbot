# Redis Configuration for AI Healthcare Chatbot (Windows)
# This configuration ensures optimal performance for Windows environments
# Version: Redis 5.0+ (Windows compatible)

# ===== NETWORK =====
bind 127.0.0.1
port 6379
timeout 0
tcp-keepalive 300

# ===== MEMORY MANAGEMENT =====
# Set maximum memory to 2GB
maxmemory 2147483648

# Eviction policy: allkeys-lru
# When memory limit is reached, evict least recently used keys
maxmemory-policy allkeys-lru

# Number of samples for LRU algorithm
maxmemory-samples 5

# ===== PERSISTENCE =====
# RDB Snapshots: Save database to disk periodically
# Save if at least 1 change in 900 seconds (15 minutes)
save 900 1
# Save if at least 10 changes in 300 seconds (5 minutes)
save 300 10
# Save if at least 10000 changes in 60 seconds
save 60 10000

# RDB filename
dbfilename dump.rdb

# Directory where RDB snapshots are saved (current directory)
dir ./

# Compress RDB snapshots
rdbcompression yes

# Add checksum to RDB files
rdbchecksum yes

# ===== LOGGING =====
loglevel notice
# Log to stdout on Windows
logfile ""

# ===== PERFORMANCE =====
# Number of databases
databases 16

# ===== WINDOWS-SPECIFIC SETTINGS =====
# Windows doesn't support all Unix features, so some settings are simplified

# Maximum number of clients (Windows typically handles fewer connections)
maxclients 10000

# Lazy freeing (Windows compatible)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ===== SLOW LOG =====
slowlog-log-slower-than 10000
slowlog-max-len 128

# ===== NOTES FOR WINDOWS USERS =====
# To start Redis with this configuration:
#   redis-server.exe redis.windows.conf
#
# Some features not available on Windows:
# - Unix sockets
# - Background save warnings
# - Some Linux-specific memory optimizations
#
# For production on Windows, consider:
# - Using Redis as a Windows Service
# - Running Redis in WSL2 for better performance
# - Using cloud-hosted Redis (AWS ElastiCache, Azure Redis Cache)
