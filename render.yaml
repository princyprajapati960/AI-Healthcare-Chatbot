# Render.com deployment configuration
services:
  # Backend API Service
  - type: web
    name: medivoice-backend
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python -m backend.train_model
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        value: sqlite:///./healthcare.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: APP_NAME
        value: MediVoice AI
      - key: DEBUG
        value: false
      - key: REDIS_HOST
        fromService:
          type: redis
          name: medivoice-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: medivoice-redis
          property: port
      - key: FRONTEND_URL
        value: https://medivoice-frontend.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  # Frontend Service
  - type: web
    name: medivoice-frontend
    env: static
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://medivoice-backend.onrender.com

  # Redis Cache
  - type: redis
    name: medivoice-redis
    region: oregon
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
